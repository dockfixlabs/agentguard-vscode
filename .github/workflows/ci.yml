name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate package.json
      run: node -e "require('./package.json')"
    - name: Check extension.js exists
      run: test -f src/extension.js